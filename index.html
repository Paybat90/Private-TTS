<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <!-- Wichtig für mobile Stabilität: Verhindert Auto-Zoom bei Eingabefeldern -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile KI Stimme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        // Unsere Pastell-Akzente im Dark Mode
                        pastel: {
                            purple: '#c4b5fd', // violet-300
                            pink: '#f9a8d4',   // pink-300
                            green: '#86efac',  // green-300
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        * { -webkit-tap-highlight-color: transparent; }
        
        /* Custom Scrollbar für die Textarea im Dark Mode */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        
        /* Verhindert iOS Zoom bei Inputs */
        input, select, textarea { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans antialiased min-h-screen flex flex-col selection:bg-pastel-purple selection:text-slate-900">

    <!-- Header -->
    <header class="bg-slate-800/80 backdrop-blur-md border-b border-slate-700/50 px-6 py-4 sticky top-0 z-20 flex items-center justify-between shadow-lg shadow-black/20">
        <h1 class="text-xl font-semibold text-pastel-purple flex items-center gap-2 tracking-wide">
            <i data-lucide="waves" class="w-6 h-6"></i>
            Vorleser KI
        </h1>
        <div class="w-9 h-9 rounded-full bg-slate-700/50 border border-pastel-purple/30 flex items-center justify-center text-pastel-purple shadow-inner">
            <i data-lucide="settings-2" class="w-5 h-5"></i>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow p-4 md:p-6 max-w-xl mx-auto w-full flex flex-col gap-6 fade-in pb-12">
        
        <!-- Settings / API Card -->
        <div class="bg-slate-800/40 border border-slate-700/50 rounded-2xl p-4 shadow-sm flex flex-col gap-4">
            <div class="flex items-center gap-2 mb-1">
                <i data-lucide="key" class="w-4 h-4 text-pastel-pink"></i>
                <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">API Konfiguration</h3>
            </div>
            
            <div class="grid grid-cols-2 gap-3 bg-slate-900/50 p-1 rounded-xl">
                <button id="btnProviderOpenAI" onclick="setProvider('openai')" class="py-2 px-3 rounded-lg text-sm font-medium transition-all bg-slate-700 text-white shadow-md">OpenAI</button>
                <button id="btnProviderGemini" onclick="setProvider('gemini')" class="py-2 px-3 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-slate-200">Gemini</button>
            </div>

            <div class="flex flex-col gap-2 relative">
                <input type="password" id="apiKeyInput" oninput="saveCurrentSettings()"
                    class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-pastel-purple focus:ring-1 focus:ring-pastel-purple transition-all text-white placeholder-slate-500"
                    placeholder="sk-proj-...">
                <button onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 p-1">
                    <i data-lucide="eye" id="eyeIcon" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- Voice & Model Selection -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="flex flex-col gap-2">
                <label class="text-xs font-semibold text-slate-400 px-1 uppercase tracking-wider">Modell</label>
                <div class="relative">
                    <select id="modelSelect" onchange="saveCurrentSettings()" class="w-full p-3.5 rounded-xl border border-slate-700 bg-slate-800 focus:border-pastel-purple focus:ring-1 focus:ring-pastel-purple transition-all appearance-none text-white shadow-sm">
                        <!-- Wird via JS gefüllt -->
                    </select>
                    <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 text-pastel-purple w-5 h-5 pointer-events-none"></i>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-xs font-semibold text-slate-400 px-1 uppercase tracking-wider">Stimme</label>
                <div class="relative">
                    <select id="voiceSelect" onchange="saveCurrentSettings()" class="w-full p-3.5 rounded-xl border border-slate-700 bg-slate-800 focus:border-pastel-purple focus:ring-1 focus:ring-pastel-purple transition-all appearance-none text-white shadow-sm">
                        <!-- Wird via JS gefüllt -->
                    </select>
                    <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 text-pastel-purple w-5 h-5 pointer-events-none"></i>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="flex flex-col gap-2">
            <label for="textInput" class="text-xs font-semibold text-slate-400 px-1 uppercase tracking-wider">Dein Text</label>
            <textarea id="textInput" rows="5" 
                class="w-full p-4 rounded-2xl border border-slate-700 bg-slate-800 focus:border-pastel-purple focus:ring-1 focus:ring-pastel-purple transition-all resize-none shadow-sm text-white placeholder-slate-500 leading-relaxed"
                placeholder="Was darf ich dir heute vorlesen?"></textarea>
        </div>

        <!-- Action Button -->
        <button id="generateBtn" onclick="handleGenerateClick()" 
            class="w-full bg-pastel-purple hover:bg-pastel-purple/90 active:scale-[0.98] text-slate-900 font-bold py-4 rounded-2xl shadow-lg shadow-pastel-purple/20 transition-all flex items-center justify-center gap-3 text-lg mt-2">
            <i data-lucide="play" class="w-6 h-6 fill-slate-900"></i>
            <span id="btnText">Audio Generieren</span>
            <i data-lucide="loader-2" id="loadingIcon" class="w-6 h-6 animate-spin hidden"></i>
        </button>

        <!-- Audio Player Container -->
        <div id="audioContainer" class="hidden flex-col gap-3 mt-2 p-5 bg-slate-800/80 backdrop-blur border border-slate-700/50 rounded-2xl shadow-lg fade-in">
            <p class="text-sm font-medium text-pastel-green flex items-center gap-2">
                <i data-lucide="check-circle-2" class="w-4 h-4"></i>
                Aufnahme bereit
            </p>
            <audio id="audioPlayer" controls class="w-full h-12 rounded-lg grayscale invert opacity-90"></audio>
        </div>
        
        <!-- Error Message -->
        <div id="errorContainer" class="hidden p-4 bg-red-900/30 text-red-300 rounded-xl text-sm border border-red-800/50 flex items-start gap-3 fade-in mt-2">
            <i data-lucide="alert-triangle" class="w-5 h-5 shrink-0 mt-0.5 text-red-400"></i>
            <span id="errorMessage">Ein Fehler ist aufgetreten.</span>
        </div>

    </main>

    <script>
        lucide.createIcons();

        // --- Datenstruktur für die dynamischen Dropdowns ---
        const apiConfig = {
            openai: {
                placeholder: "OpenAI API Key (sk-...)",
                models: [
                    { id: 'tts-1', name: 'TTS-1 (Standard & Schnell)' },
                    { id: 'tts-1-hd', name: 'TTS-1 HD (Hohe Qualität)' }
                ],
                voices: [
                    { id: 'alloy', desc: 'Alloy (Neutral & Ausgeglichen)' },
                    { id: 'echo', desc: 'Echo (Warm & Männlich)' },
                    { id: 'fable', desc: 'Fable (Britisch & Erzählend)' },
                    { id: 'onyx', desc: 'Onyx (Tief & Autorität)' },
                    { id: 'nova', desc: 'Nova (Klar & Weiblich)' },
                    { id: 'shimmer', desc: 'Shimmer (Sanft & Hell)' }
                ]
            },
            gemini: {
                placeholder: "Gemini API Key (AIzaSy...)",
                models: [
                    { id: 'gemini-2.5-flash-preview-tts', name: 'Gemini 2.5 Flash TTS' }
                ],
                voices: [
                    { id: 'Zephyr', desc: 'Zephyr (Sanft & Ruhig)' },
                    { id: 'Kore', desc: 'Kore (Klar & Freundlich)' },
                    { id: 'Fenrir', desc: 'Fenrir (Tief & Kräftig)' },
                    { id: 'Aoede', desc: 'Aoede (Lebhaft & Weiblich)' },
                    { id: 'Puck', desc: 'Puck (Quirlig & Verspielt)' }
                ]
            }
        };

        let currentProvider = 'openai';
        let currentAudioUrl = null; // Um Memory Leaks auf mobilen Geräten zu vermeiden

        // QoL Feature: Gedächtnis-Rucksack für die App
        const STORAGE_KEY = 'vorleser_ki_prefs';
        let userPrefs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"provider":"openai", "keys":{"openai":"","gemini":""}}');

        // UI Elemente
        const btnOpenAI = document.getElementById('btnProviderOpenAI');
        const btnGemini = document.getElementById('btnProviderGemini');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const modelSelect = document.getElementById('modelSelect');
        const voiceSelect = document.getElementById('voiceSelect');
        const textInput = document.getElementById('textInput');
        const generateBtn = document.getElementById('generateBtn');
        const btnText = document.getElementById('btnText');
        const loadingIcon = document.getElementById('loadingIcon');
        const audioContainer = document.getElementById('audioContainer');
        const audioPlayer = document.getElementById('audioPlayer');
        const errorContainer = document.getElementById('errorContainer');
        const errorMessage = document.getElementById('errorMessage');

        // --- Setup UI Status ---

        function setProvider(provider) {
            currentProvider = provider;
            userPrefs.provider = provider;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userPrefs));
            
            // Tab Styling
            if (provider === 'openai') {
                btnOpenAI.className = "py-2 px-3 rounded-lg text-sm font-medium transition-all bg-slate-700 text-white shadow-md";
                btnGemini.className = "py-2 px-3 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-slate-200";
            } else {
                btnGemini.className = "py-2 px-3 rounded-lg text-sm font-medium transition-all bg-slate-700 text-white shadow-md";
                btnOpenAI.className = "py-2 px-3 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-slate-200";
            }

            // Input Placeholder aktualisieren
            apiKeyInput.placeholder = apiConfig[provider].placeholder;
            apiKeyInput.value = userPrefs.keys[provider] || '';

            // Dropdowns füllen
            populateSelect(modelSelect, apiConfig[provider].models, 'id', 'name', userPrefs[provider + '_model']);
            populateSelect(voiceSelect, apiConfig[provider].voices, 'id', 'desc', userPrefs[provider + '_voice']);
            
            // Audio Reset bei Wechsel
            audioContainer.classList.add('hidden');
            if (currentAudioUrl) {
                URL.revokeObjectURL(currentAudioUrl);
                audioPlayer.src = "";
            }
        }

        function populateSelect(element, data, valueKey, labelKey, savedValue) {
            element.innerHTML = '';
            data.forEach(item => {
                const option = document.createElement('option');
                option.value = item[valueKey];
                option.textContent = item[labelKey];
                element.appendChild(option);
            });
            if (savedValue) {
                element.value = savedValue;
            }
        }

        function saveCurrentSettings() {
            userPrefs.keys[currentProvider] = apiKeyInput.value.trim();
            userPrefs[currentProvider + '_model'] = modelSelect.value;
            userPrefs[currentProvider + '_voice'] = voiceSelect.value;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userPrefs));
        }

        function togglePassword() {
            const eyeIcon = document.getElementById('eyeIcon');
            if (apiKeyInput.type === "password") {
                apiKeyInput.type = "text";
                eyeIcon.setAttribute("data-lucide", "eye-off");
            } else {
                apiKeyInput.type = "password";
                eyeIcon.setAttribute("data-lucide", "eye");
            }
            lucide.createIcons();
        }

        // --- Audio Architekur (PCM zu WAV Adapter für Gemini) ---
        
        function base64ToInt16Array(base64) {
            const binaryString = window.atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return new Int16Array(bytes.buffer);
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        function createWavFile(pcmData, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const dataSize = pcmData.length * (bitsPerSample / 8);
            
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            let offset = 44;
            for (let i = 0; i < pcmData.length; i++, offset += 2) {
                view.setInt16(offset, pcmData[i], true);
            }

            return new Blob([view], { type: 'audio/wav' });
        }

        // --- Hauptlogik API Aufrufe ---

        async function handleGenerateClick() {
            const key = apiKeyInput.value.trim();
            const text = textInput.value.trim();
            const model = modelSelect.value;
            const voice = voiceSelect.value;

            hideError();

            if (!key) {
                showError("Bitte hinterlege deinen API Key für den gewählten Anbieter.");
                return;
            }
            if (!text) {
                showError("Bitte gib einen Text ein.");
                return;
            }

            setLoadingState(true);
            audioContainer.classList.add('hidden');

            try {
                let finalAudioBlob = null;

                // ADAPTER PATTERN: Verzweigung je nach Anbieter
                if (currentProvider === 'openai') {
                    // OpenAI Architektur (Gibt fertige MP3 zurück)
                    const response = await fetch('https://api.openai.com/v1/audio/speech', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${key}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: model,
                            input: text,
                            voice: voice
                        })
                    });

                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        throw new Error(errData.error?.message || `OpenAI Fehler: ${response.status} (CORS/Auth)`);
                    }
                    
                    finalAudioBlob = await response.blob();

                } else if (currentProvider === 'gemini') {
                    // Gemini Architektur (Gibt base64 PCM zurück, muss zu WAV gebaut werden)
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
                    const payload = {
                        contents: [{ parts: [{ text: text }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: {
                                voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } }
                            }
                        }
                    };

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`Gemini Fehler: ${response.status}`);
                    
                    const result = await response.json();
                    const inlineData = result?.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                    
                    if (!inlineData || !inlineData.data) {
                        throw new Error("Keine Audiodaten von Gemini erhalten.");
                    }

                    let sampleRate = 24000; 
                    const mimeMatch = inlineData.mimeType.match(/rate=(\d+)/);
                    if (mimeMatch && mimeMatch[1]) sampleRate = parseInt(mimeMatch[1], 10);

                    const pcmData = base64ToInt16Array(inlineData.data);
                    finalAudioBlob = createWavFile(pcmData, sampleRate);
                }

                // Speicher aufräumen und neues Audio laden
                if (currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
                currentAudioUrl = URL.createObjectURL(finalAudioBlob);
                
                audioPlayer.src = currentAudioUrl;
                audioContainer.classList.remove('hidden');
                audioPlayer.play().catch(() => console.log("Autoplay blockiert."));

            } catch (error) {
                console.error("Generierungsfehler:", error);
                showError("Fehler: " + error.message);
            } finally {
                setLoadingState(false);
            }
        }

        // --- UI Helper ---
        
        function setLoadingState(isLoading) {
            generateBtn.disabled = isLoading;
            if (isLoading) {
                generateBtn.classList.add('opacity-80', 'cursor-not-allowed', 'scale-[0.98]');
                btnText.textContent = "Verarbeite...";
                loadingIcon.classList.remove('hidden');
                lucide.createIcons();
            } else {
                generateBtn.classList.remove('opacity-80', 'cursor-not-allowed', 'scale-[0.98]');
                btnText.textContent = "Audio Generieren";
                loadingIcon.classList.add('hidden');
            }
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorContainer.classList.remove('hidden');
        }

        function hideError() {
            errorContainer.classList.add('hidden');
        }

        // Initialisierung
        setProvider(userPrefs.provider || 'openai');

    </script>
</body>
</html>
