<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile KI Stimme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pastel: {
                            purple: '#c4b5fd',
                            pink: '#f9a8d4',
                            green: '#86efac',
                            blue: '#93c5fd'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(300%); } }
        * { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        input, select, textarea { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans antialiased min-h-screen flex flex-col selection:bg-pastel-purple selection:text-slate-900">

    <!-- Header -->
    <header class="bg-slate-800/80 backdrop-blur-md border-b border-slate-700/50 px-6 py-4 sticky top-0 z-20 flex items-center justify-between shadow-lg shadow-black/20">
        <h1 class="text-xl font-semibold text-pastel-purple flex items-center gap-2 tracking-wide">
            <i data-lucide="waves" class="w-6 h-6"></i>
            Vorleser KI
        </h1>
        <div class="w-9 h-9 rounded-full bg-slate-700/50 border border-pastel-purple/30 flex items-center justify-center text-pastel-purple shadow-inner">
            <i data-lucide="mic-2" class="w-5 h-5"></i>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow p-4 md:p-6 max-w-xl mx-auto w-full flex flex-col gap-6 fade-in pb-12">
        
        <!-- Settings / API Card -->
        <div class="bg-slate-800/40 border border-slate-700/50 rounded-2xl p-4 shadow-sm flex flex-col gap-4">
            <div class="flex items-center gap-2 mb-1">
                <i data-lucide="key" class="w-4 h-4 text-pastel-pink"></i>
                <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">API Konfiguration</h3>
            </div>
            
            <div class="grid grid-cols-2 gap-3 bg-slate-900/50 p-1 rounded-xl">
                <button id="btnProviderOpenAI" onclick="setProvider('openai')" class="py-2 px-3 rounded-lg text-sm font-medium transition-all bg-slate-700 text-white shadow-md">OpenAI</button>
                <button id="btnProviderGemini" onclick="setProvider('gemini')" class="py-2 px-3 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-slate-200">Gemini</button>
            </div>

            <div class="flex flex-col gap-2 relative">
                <input type="password" id="apiKeyInput" oninput="saveCurrentSettings()"
                    class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-pastel-purple focus:ring-1 focus:ring-pastel-purple transition-all text-white placeholder-slate-500"
                    placeholder="sk-proj-...">
                <button onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 p-1">
                    <i data-lucide="eye" id="eyeIcon" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- Voice & Model Selection -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="flex flex-col gap-2">
                <label class="text-xs font-semibold text-slate-400 px-1 uppercase tracking-wider">Modell</label>
                <div class="relative">
                    <select id="modelSelect" onchange="saveCurrentSettings()" class="w-full p-3.5 rounded-xl border border-slate-700 bg-slate-800 focus:border-pastel-purple focus:ring-1 focus:ring-pastel-purple transition-all appearance-none text-white shadow-sm">
                        <!-- Wird via JS gefüllt -->
                    </select>
                    <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 text-pastel-purple w-5 h-5 pointer-events-none"></i>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-xs font-semibold text-slate-400 px-1 uppercase tracking-wider">Stimme</label>
                <div class="flex gap-2">
                    <div class="relative flex-grow">
                        <select id="voiceSelect" onchange="saveCurrentSettings()" class="w-full p-3.5 rounded-xl border border-slate-700 bg-slate-800 focus:border-pastel-purple focus:ring-1 focus:ring-pastel-purple transition-all appearance-none text-white shadow-sm">
                            <!-- Wird via JS gefüllt -->
                        </select>
                        <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 text-pastel-purple w-5 h-5 pointer-events-none"></i>
                    </div>
                    <button onclick="playVoicePreview()" id="previewBtn" class="p-3.5 bg-slate-800 border border-slate-700 hover:border-pastel-purple rounded-xl text-pastel-purple transition-all shadow-sm flex items-center justify-center min-w-[52px]" title="Stimme probehören">
                        <i data-lucide="volume-2" id="previewIcon" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- NEW: Erweiterte Einstellungen (Speed & Autoplay) -->
        <div class="flex flex-col gap-3 bg-slate-800/40 border border-slate-700/50 rounded-2xl p-4 shadow-sm">
            <div class="flex items-center gap-2 mb-1">
                <i data-lucide="sliders-horizontal" class="w-4 h-4 text-pastel-green"></i>
                <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">Erweiterte Optionen</h3>
            </div>
            
            <!-- Speed Slider -->
            <div class="flex flex-col gap-3 mt-1">
                <div class="flex justify-between items-center px-1">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Sprechgeschwindigkeit</label>
                    <span id="speedValue" class="text-xs text-pastel-green font-mono font-bold bg-pastel-green/10 px-2 py-0.5 rounded-md">1.0x</span>
                </div>
                <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateSpeedLabel(); saveCurrentSettings()" 
                    class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-pastel-green">
            </div>

            <!-- Autoplay Toggle -->
            <div class="flex items-center justify-between px-1 mt-4">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Automatisch abspielen</label>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="autoPlayToggle" onchange="saveCurrentSettings()" class="sr-only peer">
                    <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-pastel-green"></div>
                </label>
            </div>
        </div>

        <!-- Input Area -->
        <div class="flex flex-col gap-2 relative">
            <div class="flex justify-between items-center px-1">
                <label for="textInput" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Dein Text</label>
                <span id="charCount" class="text-xs font-mono text-slate-500">0 Zeichen</span>
            </div>
            <div class="relative">
                <textarea id="textInput" rows="5" oninput="updateCharCount()"
                    class="w-full p-4 pb-10 rounded-2xl border border-slate-700 bg-slate-800 focus:border-pastel-purple focus:ring-1 focus:ring-pastel-purple transition-all resize-none shadow-sm text-white placeholder-slate-500 leading-relaxed"
                    placeholder="Was darf ich dir heute vorlesen?"></textarea>
                <button onclick="clearText()" class="absolute bottom-3 right-3 text-slate-400 hover:text-pastel-pink transition-colors p-1" title="Text löschen">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- Action Button -->
        <div class="relative mt-2">
            <button id="generateBtn" onclick="handleGenerateClick()" 
                class="w-full bg-pastel-purple hover:bg-pastel-purple/90 active:scale-[0.98] text-slate-900 font-bold py-4 rounded-2xl shadow-lg shadow-pastel-purple/20 transition-all flex items-center justify-center gap-3 text-lg">
                <i data-lucide="play" class="w-6 h-6 fill-slate-900"></i>
                <span id="btnText">Audio Generieren</span>
                <i data-lucide="loader-2" id="loadingIcon" class="w-6 h-6 animate-spin hidden"></i>
            </button>
            
            <!-- Indeterminate Progress Bar -->
            <div id="progressContainer" class="hidden absolute -bottom-4 left-4 right-4 h-1.5 bg-slate-800 rounded-full overflow-hidden shadow-inner">
                <div class="h-full bg-pastel-purple w-1/3 rounded-full animate-[slide_1.5s_ease-in-out_infinite]"></div>
            </div>
        </div>

        <!-- Audio Player Container -->
        <div id="audioContainer" class="hidden flex-col gap-3 mt-2 p-5 bg-slate-800/80 backdrop-blur border border-slate-700/50 rounded-2xl shadow-lg fade-in">
            <div class="flex items-center justify-between">
                <p class="text-sm font-medium text-pastel-green flex items-center gap-2">
                    <i data-lucide="check-circle-2" class="w-4 h-4"></i>
                    Aufnahme bereit
                </p>
                <a id="downloadBtn" href="#" download="ki-stimme.wav" class="text-pastel-blue hover:text-white transition-colors flex items-center gap-1.5 text-xs font-semibold bg-pastel-blue/10 px-3 py-1.5 rounded-lg">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    Speichern
                </a>
            </div>
            <audio id="audioPlayer" controls class="w-full h-12 rounded-lg grayscale invert opacity-90"></audio>
        </div>
        
        <!-- Error Message -->
        <div id="errorContainer" class="hidden p-4 bg-red-900/30 text-red-300 rounded-xl text-sm border border-red-800/50 flex items-start gap-3 fade-in mt-2">
            <i data-lucide="alert-triangle" class="w-5 h-5 shrink-0 mt-0.5 text-red-400"></i>
            <span id="errorMessage">Ein Fehler ist aufgetreten.</span>
        </div>

    </main>

    <script>
        lucide.createIcons();

        // --- Datenstruktur für die dynamischen Dropdowns ---
        const apiConfig = {
            openai: {
                placeholder: "OpenAI API Key (sk-...)",
                models: [
                    { id: 'tts-1', name: 'TTS-1 (Standard & Schnell)' },
                    { id: 'tts-1-hd', name: 'TTS-1 HD (Hohe Qualität)' }
                ],
                voices: [
                    { id: 'nova', desc: 'Nova (Weiblich | Klar & Energetisch)' },
                    { id: 'shimmer', desc: 'Shimmer (Weiblich | Sanft & Hell)' },
                    { id: 'alloy', desc: 'Alloy (Neutral | Ausgeglichen)' },
                    { id: 'echo', desc: 'Echo (Männlich | Warm)' },
                    { id: 'fable', desc: 'Fable (Männlich | Britisch & Erzählend)' },
                    { id: 'onyx', desc: 'Onyx (Männlich | Tief & Autorität)' }
                ]
            },
            gemini: {
                placeholder: "Gemini API Key (AIzaSy...)",
                models: [
                    { id: 'gemini-2.5-flash-preview-tts', name: 'Gemini 2.5 Flash TTS' }
                ],
                voices: [
                    // Weibliche & Neutrale Stimmen
                    { id: 'Aoede', desc: 'Aoede (Weiblich | Lebhaft)' },
                    { id: 'Autonoe', desc: 'Autonoe (Weiblich | Klar)' },
                    { id: 'Callirrhoe', desc: 'Callirrhoe (Weiblich | Weich)' },
                    { id: 'Despina', desc: 'Despina (Weiblich | Fein)' },
                    { id: 'Erinome', desc: 'Erinome (Weiblich | Erzählend)' },
                    { id: 'Kore', desc: 'Kore (Weiblich | Freundlich)' },
                    { id: 'Laomedeia', desc: 'Laomedeia (Weiblich | Stolz)' },
                    { id: 'Leda', desc: 'Leda (Weiblich | Hell)' },
                    { id: 'Puck', desc: 'Puck (Neutral/Hell | Quirlig)' },
                    { id: 'Zephyr', desc: 'Zephyr (Neutral/Sanft | Ruhig)' },
                    // Männliche Stimmen
                    { id: 'Achernar', desc: 'Achernar (Männlich | Kräftig)' },
                    { id: 'Algenib', desc: 'Algenib (Männlich | Neutral)' },
                    { id: 'Algieba', desc: 'Algieba (Männlich | Lebendig)' },
                    { id: 'Charon', desc: 'Charon (Männlich | Markant)' },
                    { id: 'Enceladus', desc: 'Enceladus (Männlich | Kräftig)' },
                    { id: 'Fenrir', desc: 'Fenrir (Männlich | Tief)' },
                    { id: 'Iapetus', desc: 'Iapetus (Männlich | Ruhig)' },
                    { id: 'Orus', desc: 'Orus (Männlich | Dunkel)' },
                    { id: 'Rasalgethi', desc: 'Rasalgethi (Männlich | Sehr Tief)' },
                    { id: 'Umbriel', desc: 'Umbriel (Männlich | Sanft)' }
                ]
            }
        };

        let currentProvider = 'openai';
        let currentAudioUrl = null; 

        // QoL Feature: Erweiterter Gedächtnis-Rucksack
        const STORAGE_KEY = 'vorleser_ki_prefs';
        let userPrefs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        
        // Fallbacks, falls der User die App schon mal ohne die neuen Settings geöffnet hatte
        if (!userPrefs.provider) userPrefs.provider = "openai";
        if (!userPrefs.keys) userPrefs.keys = { openai: "", gemini: "" };
        if (userPrefs.speed === undefined) userPrefs.speed = "1.0";
        if (userPrefs.autoplay === undefined) userPrefs.autoplay = true;

        // UI Elemente
        const btnOpenAI = document.getElementById('btnProviderOpenAI');
        const btnGemini = document.getElementById('btnProviderGemini');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const modelSelect = document.getElementById('modelSelect');
        const voiceSelect = document.getElementById('voiceSelect');
        const textInput = document.getElementById('textInput');
        const generateBtn = document.getElementById('generateBtn');
        const btnText = document.getElementById('btnText');
        const loadingIcon = document.getElementById('loadingIcon');
        const audioContainer = document.getElementById('audioContainer');
        const audioPlayer = document.getElementById('audioPlayer');
        const errorContainer = document.getElementById('errorContainer');
        const errorMessage = document.getElementById('errorMessage');
        
        // Neue Einstellungs-Elemente
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const autoPlayToggle = document.getElementById('autoPlayToggle');
        const progressContainer = document.getElementById('progressContainer');

        // Cache für die Vorschau-Audios (Gedächtnis-Rucksack)
        const previewCache = {};
        const previewAudio = new Audio();

        // --- Setup UI Status ---

        function updateCharCount() {
            const count = textInput.value.length;
            document.getElementById('charCount').textContent = `${count} Zeichen`;
        }

        function clearText() {
            textInput.value = '';
            updateCharCount();
            textInput.focus();
        }

        function initSettings() {
            speedSlider.value = userPrefs.speed;
            autoPlayToggle.checked = userPrefs.autoplay;
            updateSpeedLabel();
        }

        function updateSpeedLabel() {
            const speed = parseFloat(speedSlider.value).toFixed(1);
            speedValue.textContent = speed + 'x';
            // Live-Update, falls gerade etwas abspielt!
            audioPlayer.playbackRate = parseFloat(speedSlider.value);
        }

        function setProvider(provider) {
            currentProvider = provider;
            userPrefs.provider = provider;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userPrefs));
            
            // Tab Styling
            if (provider === 'openai') {
                btnOpenAI.className = "py-2 px-3 rounded-lg text-sm font-medium transition-all bg-slate-700 text-white shadow-md";
                btnGemini.className = "py-2 px-3 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-slate-200";
            } else {
                btnGemini.className = "py-2 px-3 rounded-lg text-sm font-medium transition-all bg-slate-700 text-white shadow-md";
                btnOpenAI.className = "py-2 px-3 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-slate-200";
            }

            apiKeyInput.placeholder = apiConfig[provider].placeholder;
            apiKeyInput.value = userPrefs.keys[provider] || '';

            populateSelect(modelSelect, apiConfig[provider].models, 'id', 'name', userPrefs[provider + '_model']);
            populateSelect(voiceSelect, apiConfig[provider].voices, 'id', 'desc', userPrefs[provider + '_voice']);
            
            audioContainer.classList.add('hidden');
            if (currentAudioUrl) {
                URL.revokeObjectURL(currentAudioUrl);
                audioPlayer.src = "";
            }
        }

        function populateSelect(element, data, valueKey, labelKey, savedValue) {
            element.innerHTML = '';
            data.forEach(item => {
                const option = document.createElement('option');
                option.value = item[valueKey];
                option.textContent = item[labelKey];
                element.appendChild(option);
            });
            if (savedValue) {
                element.value = savedValue;
            }
        }

        function saveCurrentSettings() {
            userPrefs.keys[currentProvider] = apiKeyInput.value.trim();
            userPrefs[currentProvider + '_model'] = modelSelect.value;
            userPrefs[currentProvider + '_voice'] = voiceSelect.value;
            userPrefs.speed = speedSlider.value;
            userPrefs.autoplay = autoPlayToggle.checked;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userPrefs));
        }

        function togglePassword() {
            const eyeIcon = document.getElementById('eyeIcon');
            if (apiKeyInput.type === "password") {
                apiKeyInput.type = "text";
                eyeIcon.setAttribute("data-lucide", "eye-off");
            } else {
                apiKeyInput.type = "password";
                eyeIcon.setAttribute("data-lucide", "eye");
            }
            lucide.createIcons();
        }

        // --- Audio Architekur (PCM zu WAV Adapter für Gemini) ---
        
        function base64ToInt16Array(base64) {
            const binaryString = window.atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return new Int16Array(bytes.buffer);
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        function createWavFile(pcmData, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const dataSize = pcmData.length * (bitsPerSample / 8);
            
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            let offset = 44;
            for (let i = 0; i < pcmData.length; i++, offset += 2) {
                // Anti-Clipping: Lautstärke sanft auf 85% dämpfen, um das blecherne Scheppern zu verhindern!
                let sample = pcmData[i];
                sample = Math.floor(sample * 0.85);
                
                // Als sauberes Little-Endian (true) schreiben, da Gemini es entgegen der Norm schon passend liefert
                view.setInt16(offset, sample, true);
            }

            return new Blob([view], { type: 'audio/wav' });
        }

        // --- Hauptlogik API Aufrufe ---

        async function playVoicePreview() {
            const voice = voiceSelect.value;
            const key = apiKeyInput.value.trim();
            const model = modelSelect.value;
            const previewBtn = document.getElementById('previewBtn');
            const previewIcon = document.getElementById('previewIcon');

            if (!key) {
                showError("Für die Vorschau brauche ich zuerst deinen API Key.");
                return;
            }

            hideError();
            
            // Haupt-Audio anhalten, falls etwas spielt
            audioPlayer.pause();
            
            // UI Feedback laden
            previewBtn.classList.add('opacity-50', 'pointer-events-none');
            previewIcon.setAttribute('data-lucide', 'loader-2');
            previewIcon.classList.add('animate-spin');
            lucide.createIcons();

            try {
                // Check im Gedächtnis-Rucksack
                if (previewCache[voice]) {
                    previewAudio.src = previewCache[voice];
                    await previewAudio.play();
                    return; 
                }

                // Namen hübsch extrahieren für den kurzen Satz
                const voicesList = apiConfig[currentProvider].voices;
                const voiceObj = voicesList.find(v => v.id === voice);
                const voiceName = voiceObj ? voiceObj.desc.split(' ')[0] : voice;
                const previewText = `Hallo, ich bin ${voiceName}.`;

                let finalAudioBlob = null;

                // API Aufrufe analog zur Hauptfunktion
                if (currentProvider === 'openai') {
                    const response = await fetch('https://api.openai.com/v1/audio/speech', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ model: model, input: previewText, voice: voice })
                    });
                    if (!response.ok) throw new Error("Vorschau-Fehler bei OpenAI");
                    finalAudioBlob = await response.blob();
                } else if (currentProvider === 'gemini') {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: previewText }] }],
                            generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } } }
                        })
                    });
                    if (!response.ok) throw new Error("Vorschau-Fehler bei Gemini");
                    const result = await response.json();
                    const inlineData = result?.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                    const pcmData = base64ToInt16Array(inlineData.data);
                    let sampleRate = 24000;
                    const mimeMatch = inlineData.mimeType.match(/rate=(\d+)/);
                    if (mimeMatch && mimeMatch[1]) sampleRate = parseInt(mimeMatch[1], 10);
                    finalAudioBlob = createWavFile(pcmData, sampleRate);
                }

                const url = URL.createObjectURL(finalAudioBlob);
                previewCache[voice] = url; // Im Rucksack ablegen
                previewAudio.src = url;
                await previewAudio.play();

            } catch (error) {
                console.error(error);
                showError("Vorschau konnte leider nicht geladen werden.");
            } finally {
                // UI wiederherstellen
                previewBtn.classList.remove('opacity-50', 'pointer-events-none');
                previewIcon.setAttribute('data-lucide', 'volume-2');
                previewIcon.classList.remove('animate-spin');
                lucide.createIcons();
            }
        }

        async function handleGenerateClick() {
            const key = apiKeyInput.value.trim();
            const text = textInput.value.trim();
            const model = modelSelect.value;
            const voice = voiceSelect.value;

            hideError();

            if (!key) {
                showError("Bitte hinterlege deinen API Key für den gewählten Anbieter.");
                return;
            }
            if (!text) {
                showError("Bitte gib einen Text ein.");
                return;
            }

            setLoadingState(true);
            audioContainer.classList.add('hidden');

            try {
                let finalAudioBlob = null;

                if (currentProvider === 'openai') {
                    const response = await fetch('https://api.openai.com/v1/audio/speech', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${key}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: model,
                            input: text,
                            voice: voice
                        })
                    });

                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        throw new Error(errData.error?.message || `OpenAI Fehler: ${response.status} (CORS/Auth)`);
                    }
                    
                    finalAudioBlob = await response.blob();

                } else if (currentProvider === 'gemini') {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
                    const payload = {
                        contents: [{ parts: [{ text: text }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: {
                                voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } }
                            }
                        }
                    };

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`Gemini Fehler: ${response.status}`);
                    
                    const result = await response.json();
                    const inlineData = result?.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                    
                    if (!inlineData || !inlineData.data) {
                        throw new Error("Keine Audiodaten von Gemini erhalten.");
                    }

                    let sampleRate = 24000; 
                    const mimeMatch = inlineData.mimeType.match(/rate=(\d+)/);
                    if (mimeMatch && mimeMatch[1]) sampleRate = parseInt(mimeMatch[1], 10);

                    const pcmData = base64ToInt16Array(inlineData.data);
                    finalAudioBlob = createWavFile(pcmData, sampleRate);
                }

                if (currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
                currentAudioUrl = URL.createObjectURL(finalAudioBlob);
                
                audioPlayer.src = currentAudioUrl;
                
                // Download-Button dynamisch anpassen
                const downloadBtn = document.getElementById('downloadBtn');
                downloadBtn.href = currentAudioUrl;
                downloadBtn.download = currentProvider === 'openai' ? 'ki-stimme.mp3' : 'ki-stimme.wav';
                
                // Geschwindigkeit aus den Settings anwenden
                audioPlayer.playbackRate = parseFloat(speedSlider.value);
                
                audioContainer.classList.remove('hidden');
                
                // Automatisches Abspielen prüfen
                if (autoPlayToggle.checked) {
                    audioPlayer.play().catch(() => console.log("Autoplay wurde vom mobilen Browser blockiert."));
                }

            } catch (error) {
                console.error("Generierungsfehler:", error);
                showError("Fehler: " + error.message);
            } finally {
                setLoadingState(false);
            }
        }

        function setLoadingState(isLoading) {
            generateBtn.disabled = isLoading;
            if (isLoading) {
                generateBtn.classList.add('opacity-80', 'cursor-not-allowed', 'scale-[0.98]');
                btnText.textContent = "Verarbeite...";
                loadingIcon.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                lucide.createIcons();
            } else {
                generateBtn.classList.remove('opacity-80', 'cursor-not-allowed', 'scale-[0.98]');
                btnText.textContent = "Audio Generieren";
                loadingIcon.classList.add('hidden');
                progressContainer.classList.add('hidden');
            }
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorContainer.classList.remove('hidden');
        }

        function hideError() {
            errorContainer.classList.add('hidden');
        }

        // Initiale Ladevorgänge
        initSettings();
        setProvider(userPrefs.provider || 'openai');

    </script>
</body>
</html>
